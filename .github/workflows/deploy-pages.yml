# Redeploy requested after GitHub Pages enablement
name: Deploy Blazor WebAssembly to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: BusinessTravelSystem.App/packages.lock.json

      - name: Restore locked dependencies
        run: dotnet restore BusinessTravelSystemPrototype.sln --locked-mode

      - name: Publish the original Blazor WebAssembly app
        run: dotnet publish BusinessTravelSystem.App/BusinessTravelSystem.App.csproj --configuration Release --no-restore --output publish

      - name: Prepare Blazor output for the repository Pages path
        shell: bash
        run: |
          PUBLISH_DIR="publish/wwwroot"
          sed -i 's#<base href="/" />#<base href="/business-travel-system-proto2/" />#' "$PUBLISH_DIR/index.html"
          cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/404.html"
          touch "$PUBLISH_DIR/.nojekyll"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload published Blazor app
        uses: actions/upload-pages-artifact@v4
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy original Blazor build
        id: deployment
        uses: actions/deploy-pages@v4
